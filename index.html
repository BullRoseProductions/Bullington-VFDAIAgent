<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Before the Call</title>
    <style>
      /* Zero the browser's default body margin (8px) so the app's dark
         background reaches all four viewport edges. Without this, the gap
         shows the default white canvas as a frame — invisible under the old
         light login, glaring under the navy one. Dark base bg is a
         belt-and-suspenders so no light ever peeks at the edges (login + app). */
      html, body { margin: 0; }
      body { background: #080A10; }

      /* Native form controls: force a dark scheme so browsers never pick a
         white system popup (fixes white-on-white <option> lists / date
         pickers on machines whose OS default is light — the app is dark-themed).
         color-scheme is the root cure; the explicit control/option colors are
         belt-and-suspenders for Chrome/Firefox on Windows/Linux. */
      :root { color-scheme: dark; }
      select,
      option,
      input[type="date"],
      input[type="month"],
      input[type="time"] {
        background-color: #13161B;   /* FIRE.card */
        color: #F7F8FA;              /* FIRE.textPrimary */
      }
      option { background-color: #13161B; color: #F7F8FA; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
